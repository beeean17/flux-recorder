name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            python-version: "3.13"
            archive-name: flux-recorder-windows.zip
          - label: macOS
            os: macos-latest
            python-version: "3.13"
            archive-name: flux-recorder-macos.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build package on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build\build_windows.bat

      - name: Build package on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: bash build/build_mac.sh

      - name: Archive Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\flux-recorder -DestinationPath ${{ matrix.archive-name }}

      - name: Archive macOS build
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -d "dist/flux-recorder.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/flux-recorder.app" "${{ matrix.archive-name }}"
          else
            ditto -c -k --keepParent "dist/flux-recorder" "${{ matrix.archive-name }}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: ${{ matrix.archive-name }}

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* --generate-notes
          fi
